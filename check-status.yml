name: Check CBSE result status

on:
  schedule:
    # Every 3 hours, all day (UTC). 8 runs/day: 00:00, 03:00, 06:00, 09:00,
    # 12:00, 15:00, 18:00, 21:00 UTC.
    - cron: '0 */3 * * *'
  workflow_dispatch: {}   # lets you also trigger a check manually from the Actions tab

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run trusted-news checker
        run: python scripts/check_news.py

      - name: Commit data.json if changed
        run: |
          git config user.name "cbse-result-watch-bot"
          git config user.email "actions@users.noreply.github.com"
          if ! git diff --quiet -- data.json; then
            git add data.json
            git commit -m "chore: automated status check ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
          else
            echo "No changes to commit."
          fi
